name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt    
      - run: python -m py_compile src/worker.py src/api.py
      - name: Run Tests
        run: python3 -m pytest tests/ -v


  build:
    needs: test
    if: github.event_name == 'push'              
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/url-monitor
      
    steps:
      -
        name: Set the repository name to lowercase 
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/url-monitor" >> $GITHUB_ENV

      -
        name: Actions Checkout
        uses: actions/checkout@v5
      - 
        name: Login to GithuB Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      -
        name: Set up docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |          
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}


  deploy:
    needs: build
    if: github.event_name == 'push'              
    runs-on: ubuntu-latest
    permissions: 
      contents: read
    env:
      KUBECONFIG: kubeconfig.yml
    steps: 
      -
        name: Install kubectl on runner
        uses: azure/setup-kubectl@v4
        with:
          version: latest
        id: install
      -
        name: Decode kubectlconfig
        run: |
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 --decode > kubeconfig.yml        
      -
        name: Update both deployments to the new image        
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/url-monitor:${{ github.sha }}"
          kubectl set image deployment/url-monitor-worker worker=$IMAGE -n url-monitor
          kubectl set image deployment/url-monitor-api api=$IMAGE -n url-monitor

            
        


