services:
  api:
    build: .
    image: url-monitor:latest
    container_name: url-monitor-api
    volumes:
      - .:/app
    command: python api.py
    ports:
      - "5000:5000"
    restart: always

  worker:
    build: .
    image: url-monitor:latest
    container_name: url-monitor-worker
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      URLS: ${URLS}
      INTERVAL: ${INTERVAL}
    command: python worker.py
    restart: always

  web:
    image: nginx:alpine
    container_name: nginx-server
    ports:
      - "8080:80"
    volumes:
      - ./output:/usr/share/nginx/html
    restart: always
