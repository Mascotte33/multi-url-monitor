apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-monitor

  template:
    metadata:
      labels:
        app: url-monitor

    spec:
      containers:
        - name: url-monitor
          image: url-monitor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000

          envFrom:
            - secretRef:
                name: url-monitor-secret

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5